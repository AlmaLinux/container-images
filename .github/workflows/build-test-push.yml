name: Build, test and push to the Client Library

on:
  workflow_dispatch:
      inputs:
        production:
          description: |
            'Push to production registries'
            'not checked - to testing'
          required: true
          type: boolean
          default: false

        notify_mattermost:
          description: 'Send notification to Mattermost'
          required: true
          type: boolean
          default: false

        version_major:
          description: 'AlmaLinux major version'
          required: true
          default: '10'
          type: choice
          options:
            - 10-kitten
            - 10
            - 9
            - 8

        type_default:
          description: 'default'
          required: true
          type: boolean
          default: true

        type_minimal:
          description: 'minimal'
          required: true
          type: boolean
          default: true

        type_micro:
          description: 'micro'
          required: true
          type: boolean
          default: true

        type_base:
          description: 'base'
          required: true
          type: boolean
          default: true

        type_init:
          description: 'init'
          required: true
          type: boolean
          default: true

        type_toolbox:
          description: 'toolbox'
          required: true
          type: boolean
          default: true

  schedule:
    # run every day at 04:00 UTC
    - cron:  '00 04 * * *'

env:
  # List of versions to build on schedule
  # TODO: add 10 when it is released
  # Kitten should not be built on schedule
  versions_list: '"8", "9", "10"'

  # List image types to build on schedule
  image_types: '"default", "minimal", "micro", "base", "init", "toolbox"'

  # Latest version
  version_latest: 10

  # Platforms list
  platforms: 'linux/amd64, linux/ppc64le, linux/s390x, linux/arm64'

  # Registries lists
  registries_production: 'docker.io/almalinux, quay.io/almalinuxorg, ghcr.io/almalinux'
  registries_testing: 'quay.io/ryosuke_666'

  # SBOM tools repository
  sbom_tools_repo: "https://github.com/AlmaLinux/cloud-images-sbom-tools.git"

  # Fedora image for SBOM generation (needs rpm 4.19+ for SQLite RPM DB support)
  sbom_fedora_image: "fedora:43"


jobs:
  init-data:
    name: Set matrix, prepare variables
    runs-on: ubuntu-24.04
    outputs:
      version_major_matrix: ${{ steps.init-data.outputs.version_major_matrix }}
      image_types_matrix: ${{ steps.init-data.outputs.image_types_matrix }}
      production: ${{ steps.init-data.outputs.production }}
      notify_mattermost: ${{ steps.init-data.outputs.notify_mattermost }}
      date_time_stamp: ${{ steps.init-data.outputs.date_time_stamp }}
      date_stamp: ${{ steps.init-data.outputs.date_stamp }}
      time_stamp: ${{ steps.init-data.outputs.time_stamp }}

    steps:
      - name: Set matrix, prepare variables
        id: init-data
        run: |
          # Set matrix, prepare variables
          case ${{ github.event_name }} in
            workflow_dispatch)
              # Set image types matrix based on boolean inputs.type_* with true value
              echo "image_types_matrix=$(jq -c <<< '[${{ format('"{0}", "{1}", "{2}", "{3}", "{4}", "{5}"', ( inputs.type_default && 'default' ), ( inputs.type_minimal && 'minimal' ), ( inputs.type_micro && 'micro' ), ( inputs.type_base && 'base' ), ( inputs.type_init && 'init' ), ( inputs.type_toolbox && 'toolbox' ) ) }}]')" >> $GITHUB_OUTPUT
              echo "version_major_matrix=$(jq -c <<< '["${{ inputs.version_major }}"]')" >> $GITHUB_OUTPUT
              echo "production=${{ inputs.production }}" >> $GITHUB_OUTPUT
              echo "notify_mattermost=${{ inputs.notify_mattermost }}" >> $GITHUB_OUTPUT
              ;;
            schedule)
              # Set image types matrix based on the environment variable image_types: '"type1", "type2"'
              echo "image_types_matrix=$(jq -c <<< '[${{ env.image_types }}]')" >> $GITHUB_OUTPUT
              echo "version_major_matrix=$(jq -c <<< '[${{ env.versions_list }}]')" >> $GITHUB_OUTPUT
              echo "production=false" >> $GITHUB_OUTPUT       # only testing if scheduled
              echo "notify_mattermost=true" >> $GITHUB_OUTPUT # always notify if scheduled
              ;;
          esac

          # date and time stamps
          date_time_stamp=$(date -u '+%Y%m%d%H%M%S')
          date_stamp=${date_time_stamp:0:-6}
          time_stamp=${date_time_stamp:8}
          time_stamp="${time_stamp:0:2}:${time_stamp:2:2}:${time_stamp:4:2}"

          echo "date_time_stamp=${date_time_stamp}" >> "$GITHUB_OUTPUT"
          echo "date_stamp=${date_stamp}" >> "$GITHUB_OUTPUT"
          echo "time_stamp=${time_stamp}" >> "$GITHUB_OUTPUT"

  build-test-push:
    name: Deploy ${{ matrix.version_major }} ${{ matrix.image_types }} images
    runs-on: ubuntu-24.04
    needs: [init-data]
    strategy:
      fail-fast: false
      matrix:
        version_major: ${{ fromJSON(needs.init-data.outputs.version_major_matrix) }}
        image_types: ${{ fromJSON(needs.init-data.outputs.image_types_matrix) }}
        exclude:
          - image_types: 'false'
    env:
      date_time_stamp: ${{ needs.init-data.outputs.date_time_stamp }}
      date_stamp: ${{ needs.init-data.outputs.date_stamp }}
      time_stamp: ${{ needs.init-data.outputs.time_stamp }}
      notify_mattermost: ${{ needs.init-data.outputs.notify_mattermost }}
      production: ${{ needs.init-data.outputs.production }}

    steps:
      -
        name: Prepare AlmaLinux Minor version number
        run: |
          case ${{ matrix.version_major }} in
            8)
              version_minor=".10" ;;
            9)
              version_minor=".7"  ;;
            10)
              version_minor=".1" ;;
            10-kitten)
              version_minor= ;;
            *)
              echo "Almalinux ${{ matrix.version_major }} is not supported!" && false
          esac
          echo "version_minor=${version_minor}" >> $GITHUB_ENV

      -
        name: Check update
        id: check-update
        run: |
          # dnf check-update --secseverity=Important
          # exit codes:
          #   0 - no updates
          #   100 - updates available
          #   125 - tag not found
          #   127 - command not found
          #   255 - workflow_dispatch run
          check_update=0
          podman run --quiet --rm quay.io/almalinuxorg/almalinux:${{ matrix.version_major }} \
            dnf check-update --secseverity=Important || \
            check_update=$?
          [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && \
            check_update=255

          echo "check_update=${check_update}" >> "$GITHUB_ENV"
          echo "Exit code: '$check_update'"

      -
        name: Set platforms and registries
        if: env.check_update != 0
        run: |
            # Platforms
            platforms="${{ env.platforms }}"
            case ${{ matrix.version_major }} in
              8|9)
                platforms="linux/386, ${platforms}" ;;
              10)
                platforms="linux/amd64/v2, ${platforms}" ;;
              10-kitten)
                platforms="linux/386, linux/riscv64, linux/amd64/v2, ${platforms}" ;;
            esac
            echo "platforms=${platforms}" >> $GITHUB_ENV

            # Registries
            registries="${{ env.registries_testing }}"
            [[ "${{ needs.init-data.outputs.production }}" == "true" ]] && \
              registries="${{ env.registries_production }}"
            echo "registries=${registries}" >> $GITHUB_ENV

      -
        name: Generate list of images to use as base name for tags
        if: env.check_update != 0
        run: |
          # list of registries to push to
          REGISTRIES="${{ env.registries }}"

          IMAGE_NAMES=
          # generate image names in format $REGISTRY/almalinux or $REGISTRY/${{ matrix.version_major }}-${{ matrix.image_types }}
          # image names are used by docker/metadata-action to set 'images'
          for REGISTRY in ${REGISTRIES//,/ }; do
            # 'default' images should not go to docker.io
            [ "${{ matrix.image_types }}" = "default" ] && [[ $REGISTRY = *'docker.io'* ]] && continue

            # 'default' images goes to $REGISTRY/almalinux
            [ "${{ matrix.image_types }}" = "default" ] \
              && IMAGE_NAME="$REGISTRY/almalinux" \
              || IMAGE_NAME="$REGISTRY/${{ matrix.version_major }}-${{ matrix.image_types }}"
            IMAGE_NAMES="${IMAGE_NAMES} ${IMAGE_NAME}"
            unset IMAGE_NAME
          done

          # remove space at the beginning of string
          IMAGE_NAMES=${IMAGE_NAMES# }
          # separate with comma instead of space and export to the action
          echo "IMAGE_NAMES=${IMAGE_NAMES// /,}" >> $GITHUB_ENV

          # [Debug]
          echo $IMAGE_NAMES

      -
        name: Enable containerd image store, set Docker data-root
        if: env.check_update != 0
        run: |
          # JQ file to switch into containerd image store and set Docker data-root
          cat << EOF > containerd-snapshotter.jq
          .features |= . + { "containerd-snapshotter": true } |
          ."data-root" ="/mnt/docker"
          EOF
          sudo sh -c 'jq -n -f containerd-snapshotter.jq > /etc/docker/daemon.json'
          sudo systemctl restart docker
          docker info -f '{{ .DriverStatus }}'
          echo "[Debug] Docker data-root:"
          docker info -f '{{ .DockerRootDir }}'

      -
        name: Checkout ${{ github.repository }}, branch 'main'
        if: env.check_update != 0
        uses: actions/checkout@v6

      -
        name: Checkout ${{ github.repository }}, branch '${{ matrix.version_major }}', path '${{ matrix.version_major }}'
        if: env.check_update != 0
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.version_major }}
          path: ${{ matrix.version_major }}

      -
        name: Clone SBOM tools
        if: env.check_update != 0
        run: |
          git clone ${{ env.sbom_tools_repo }} /tmp/sbom-tools

      -
        name: Set up QEMU
        if: env.check_update != 0
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        if: env.check_update != 0
        uses: docker/setup-buildx-action@v4

      -
        name: Login to Docker.io
        if: contains(env.registries, 'docker.io') && env.check_update != 0
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.production == 'true' && secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME }}
          password: ${{ env.production == 'true' && secrets.DOCKERHUB_TOKEN || secrets.TEST_DOCKERHUB_TOKEN }}

      -
        name: Login to Quay.io
        if: contains(env.registries, 'quay.io') && env.check_update != 0
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ env.production == 'true' && secrets.QUAY_IO_USERNAME || secrets.TEST_QUAY_IO_USERNAME }}
          password: ${{ env.production == 'true' && secrets.QUAY_IO_CLI_PASSWORD || secrets.TEST_QUAY_IO_CLI_PASSWORD }}

      -
        name: Login to Ghcr.io
        if: contains(env.registries, 'ghcr.io') && env.check_update != 0
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.production == 'true' && secrets.GIT_HUB_USERNAME || secrets.TEST_GITHUB_USERNAME }}
          password: ${{ env.production == 'true' && secrets.GIT_HUB_TOKEN || secrets.TEST_GITHUB_TOKEN }}

      -
        name: Generate tags and prepare metadata to build and push
        if: env.check_update != 0
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base names for tags
          images: ${{ env.IMAGE_NAMES }}

          # list of tags
          tags: |
            type=raw,value=latest,enable=${{ matrix.image_types != 'default' || ( matrix.image_types == 'default' && matrix.version_major == env.version_latest ) }}
            type=raw,value=${{ matrix.version_major }},enable=true
            type=raw,value=${{ matrix.version_major }}${{ env.version_minor }},enable=true
            type=raw,value=${{ matrix.version_major }}${{ env.version_minor }}-${{ env.date_stamp }},enable=true

      -
        name: Build images
        if: env.check_update != 0
        id: build-images
        uses: docker/build-push-action@v7
        with:
          provenance: false
          context: "{{defaultContext}}:Containerfiles/${{ matrix.version_major }}"
          file: ./Containerfile.${{ matrix.image_types }}
          platforms: ${{ env.platforms }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      -
        name: Test images
        if: env.check_update != 0
        id: test-images
        run: |
          # [Test]

          # Release string and file name
          if [[ ${{ matrix.version_major }} != *'kitten'* ]]; then
            release_string="AlmaLinux release ${{ matrix.version_major }}${{ env.version_minor }}"
          else
            # TODO: change to the actual number when Kitten new release is available
            release_string="AlmaLinux Kitten release 10"
          fi
          echo "release_string=${release_string}" >> $GITHUB_ENV

          # Container platform to architecture mapping
          declare -A platform_to_arch
          platform_to_arch["linux/riscv64"]="riscv64"
          platform_to_arch["linux/amd64"]="x86_64"
          platform_to_arch["linux/ppc64le"]="ppc64le"
          platform_to_arch["linux/s390x"]="s390x"
          platform_to_arch["linux/arm64"]="aarch64"
          if [[ ${{ matrix.image_types }} == *'micro'* ]]; then
            # Machine hardware name is x86_64 on linux/386 and linux/amd64/v2 platforms
            platform_to_arch["linux/386"]="x86_64"
            platform_to_arch["linux/amd64/v2"]="x86_64"
            arch_query="uname -m"
          else
            platform_to_arch["linux/386"]="i686"
            platform_to_arch["linux/amd64/v2"]="x86_64_v2"
            arch_query="rpm -qf --queryformat '%{ARCH}' /etc/almalinux-release"
          fi

          platforms="${{ env.platforms }}"
          for platform in ${platforms//,/ }; do
            echo "Testing AlmaLinux ${{ matrix.version_major }} ${{ matrix.image_types }} image for ${platform}:"

            docker run --platform=${platform} ${{ steps.build-images.outputs.digest }} /bin/bash -c " \
            echo \"\$(cat /etc/almalinux-release) \$(${arch_query})\"" | \
            grep -E "${release_string}.*${platform_to_arch[${platform}]}"
          done

      -
        name: Detect previous released tag for this image type
        if: env.check_update != 0
        id: detect-prev
        env:
          VMJ: ${{ matrix.version_major }}
        run: |
          set -euo pipefail
          IMAGE_REPO="${IMAGE_NAMES%%,*}"
          PREV_TAG="${VMJ}"

          echo "Checking ${IMAGE_REPO}:${PREV_TAG}"
          if skopeo inspect docker://"${IMAGE_REPO}:${PREV_TAG}" >/dev/null 2>&1; then
            echo "prev_image=${IMAGE_REPO}" >> "$GITHUB_ENV"
            echo "prev_tag=${PREV_TAG}"     >> "$GITHUB_ENV"
            echo "prev_found=true"          >> "$GITHUB_OUTPUT"
            echo "Previous: ${IMAGE_REPO}:${PREV_TAG}"
          else
            echo "No previous tag found for ${IMAGE_REPO}:${PREV_TAG} — treating as first release."
            echo "prev_image="              >> "$GITHUB_ENV"
            echo "prev_tag="                >> "$GITHUB_ENV"
            echo "prev_found=false"         >> "$GITHUB_OUTPUT"
          fi

      -
        name: Install crane
        if: env.check_update != 0
        run: |
          set -euo pipefail
          ver=v0.20.6
          curl -sSL -o /tmp/crane.tgz \
          https://github.com/google/go-containerregistry/releases/download/${ver}/go-containerregistry_Linux_x86_64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/crane.tgz crane
          crane version

      -
        name: Install ORAS
        if: env.check_update != 0
        run: |
          set -euo pipefail
          ver=v1.2.2
          curl -sSL -o /tmp/oras.tgz \
            "https://github.com/oras-project/oras/releases/download/${ver}/oras_${ver#v}_linux_amd64.tar.gz"
          sudo tar -C /usr/local/bin -xzf /tmp/oras.tgz oras
          oras version

      #
      # ── SBOM-based changelog generation ───────────────────────────────────
      #
      # Instead of raw `rpm -qa` diffing, we now:
      #   1. Generate SBOM (SPDX 2.3 JSON) per platform using cloud-images-sbom-tools
      #   2. Extract the previous SBOM from the image label (if exists)
      #   3. Diff the two SBOMs to produce a Markdown changelog
      #

      -
        name: Generate SBOM per platform (new image)
        if: env.check_update != 0
        id: sbom-generate
        env:
          IMG_NEW_DIGEST: ${{ steps.build-images.outputs.digest }}
          PLATFORMS: ${{ env.platforms }}
          VMJ: ${{ matrix.version_major }}
          IMT: ${{ matrix.image_types }}
          DTS: ${{ needs.init-data.outputs.date_time_stamp }}
          FEDORA_IMAGE: ${{ env.sbom_fedora_image }}
        run: |
          set -euo pipefail
          mkdir -p sbom_output/${VMJ}/${IMT}

          for p in ${PLATFORMS//,/ }; do
            plat=$(echo "$p" | xargs)
            key="${plat//\//_}"

            echo "=== Generating SBOM for ${plat} ==="

            # Export the container filesystem and mount it on the host
            rootfs_dir=$(mktemp -d)
            container_id=$(docker create --platform="${plat}" "${IMG_NEW_DIGEST}")
            docker export "${container_id}" | tar -xf - -C "${rootfs_dir}" 2>/dev/null || true
            docker rm "${container_id}" > /dev/null

            # Run SBOM generation inside a Fedora container.
            # Ubuntu's rpm 4.18 cannot read AlmaLinux 10's SQLite RPM DB;
            # Fedora's rpm 4.19+ has native SQLite support.
            sbom_host_dir="$(pwd)/sbom_output/${VMJ}/${IMT}"
            metadata_file="metadata_${key}.json"
            sbom_file="sbom_${key}.spdx.json"
            image_name="AlmaLinux-${VMJ}-${IMT}-${plat//\//-}"

            docker run --rm \
              -v "${rootfs_dir}:/mnt/rootfs:ro" \
              -v /tmp/sbom-tools:/tmp/sbom-tools:ro \
              -v "${sbom_host_dir}:/output" \
              "${FEDORA_IMAGE}" \
              bash -c '
                dnf install -y python3-rpm python3-dnf python3-pip --quiet && \
                pip install --root-user-action=ignore -r /tmp/sbom-tools/requirements.txt --quiet && \
                python3 /tmp/sbom-tools/sbom_data_collector.py \
                  --root /mnt/rootfs \
                  -o /output/'"${metadata_file}"' \
                  --verbose && \
                python3 /tmp/sbom-tools/sbom_generator.py \
                  '"\"${image_name}\""' \
                  /output/'"${metadata_file}"' \
                  /output/'"${sbom_file}"'
              ' || {
                echo "Warning: SBOM generation failed for ${plat}, skipping"
                sudo rm -rf "${rootfs_dir}"
                continue
              }

            echo "[Debug] SBOM generated: ${sbom_host_dir}/${sbom_file} ($(wc -c < "${sbom_host_dir}/${sbom_file}") bytes)"

            # Clean up rootfs
            sudo rm -rf "${rootfs_dir}"
          done

      -
        name: Fetch previous SBOM from OCI artifact (if exists)
        if: env.check_update != 0
        id: sbom-fetch-prev
        env:
          IMG_PREV: ${{ env.prev_image }}
          TAG_PREV: ${{ env.prev_tag }}
          PLATFORMS: ${{ env.platforms }}
          VMJ: ${{ matrix.version_major }}
          IMT: ${{ matrix.image_types }}
        run: |
          set -euo pipefail
          mkdir -p sbom_prev/${VMJ}/${IMT}

          if [ -z "${IMG_PREV:-}" ] || [ -z "${TAG_PREV:-}" ]; then
            echo "No previous image found — skipping previous SBOM fetch."
            echo "prev_sbom_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          full_ref="${IMG_PREV}:${TAG_PREV}"
          echo "Fetching previous SBOMs from OCI artifacts on ${full_ref}..."

          # Get manifest list for previous image
          manifest_list=$(crane manifest "${full_ref}" 2>/dev/null) || {
            echo "Could not fetch manifest for ${full_ref}"
            echo "prev_sbom_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          any_found=false
          for p in ${PLATFORMS//,/ }; do
            plat=$(echo "$p" | xargs)
            key="${plat//\//_}"

            IFS='/' read -r os arch variant <<< "${plat}"

            # Find per-platform digest from manifest list
            if echo "${manifest_list}" | jq -e '.manifests' >/dev/null 2>&1; then
              if [ -n "${variant}" ]; then
                plat_digest=$(echo "${manifest_list}" | jq -r \
                  --arg os "${os}" --arg arch "${arch}" --arg var "${variant}" \
                  '.manifests[] | select(.platform.os==$os and .platform.architecture==$arch and .platform.variant==$var) | .digest')
              else
                plat_digest=$(echo "${manifest_list}" | jq -r \
                  --arg os "${os}" --arg arch "${arch}" \
                  '.manifests[] | select(.platform.os==$os and .platform.architecture==$arch and (.platform.variant==null or .platform.variant=="")) | .digest')
              fi
            else
              plat_digest=$(crane digest "${full_ref}" 2>/dev/null) || true
            fi

            if [ -z "${plat_digest}" ]; then
              echo "No digest for ${plat} in previous image, skipping"
              continue
            fi

            # Discover SBOM referrers
            sbom_desc=$(oras discover \
              --artifact-type "application/spdx+json" \
              --output json \
              "${IMG_PREV}@${plat_digest}" 2>/dev/null) || {
                echo "No referrers found for ${plat}"
                continue
              }

            # Get the most recent SBOM artifact digest
            sbom_artifact_digest=$(echo "${sbom_desc}" | jq -r \
              '.manifests // [] | sort_by(.annotations["org.opencontainers.image.created"] // "") | last | .digest // empty')

            if [ -z "${sbom_artifact_digest}" ]; then
              echo "No SBOM artifact found for ${plat}"
              continue
            fi

            # Pull the SBOM artifact
            pull_dir=$(mktemp -d)
            oras pull \
              --output "${pull_dir}" \
              "${IMG_PREV}@${sbom_artifact_digest}" 2>/dev/null || {
                echo "Failed to pull SBOM artifact for ${plat}"
                rm -rf "${pull_dir}"
                continue
              }

            # Find the SPDX JSON file in the pulled content
            sbom_pulled=$(find "${pull_dir}" -name '*.spdx.json' -o -name '*.json' | head -1)
            if [ -n "${sbom_pulled}" ]; then
              cp "${sbom_pulled}" "sbom_prev/${VMJ}/${IMT}/sbom_${key}.spdx.json"
              echo "Restored previous SBOM for ${plat} ($(wc -c < "${sbom_pulled}") bytes)"
              any_found=true
            else
              echo "No SPDX JSON found in pulled artifact for ${plat}"
            fi
            rm -rf "${pull_dir}"
          done

          if [ "${any_found}" = "true" ]; then
            echo "prev_sbom_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "prev_sbom_found=false" >> "$GITHUB_OUTPUT"
          fi

      -
        name: Diff SBOMs and build Markdown changelog
        if: env.check_update != 0
        id: sbom-diff
        env:
          PLATFORMS: ${{ env.platforms }}
          VMJ: ${{ matrix.version_major }}
          IMT: ${{ matrix.image_types }}
          PREV_TAG: ${{ env.prev_tag }}
          DTS: ${{ needs.init-data.outputs.date_time_stamp }}
        run: |
          set -euo pipefail
          out="rpm_diff_${VMJ}_${IMT}.md"

          if [ -n "${PREV_TAG}" ]; then
            echo "Changes since last version (${PREV_TAG}):" > "${out}"
          else
            echo "Changes since last version: (first release)" > "${out}"
          fi
          echo "" >> "${out}"

          any_section=false
          for p in ${PLATFORMS//,/ }; do
            plat=$(echo "$p" | xargs)
            key="${plat//\//_}"
            new_sbom="sbom_output/${VMJ}/${IMT}/sbom_${key}.spdx.json"
            old_sbom="sbom_prev/${VMJ}/${IMT}/sbom_${key}.spdx.json"

            [ ! -f "${new_sbom}" ] && continue

            {
              echo "<details>"
              printf "<summary>Platform: \`%s\`</summary>\n\n" "$plat"
            } >> "${out}"

            # Extract package lists from SPDX SBOM JSON
            # Each package has: name, versionInfo, SPDXID
            jq -r '.packages[]? | select(.SPDXID != "SPDXRef-DOCUMENT") | [.name, .versionInfo // "unknown"] | @tsv' \
              "${new_sbom}" | sort > /tmp/new_pkgs_${key}.txt

            if [ -f "${old_sbom}" ]; then
              jq -r '.packages[]? | select(.SPDXID != "SPDXRef-DOCUMENT") | [.name, .versionInfo // "unknown"] | @tsv' \
                "${old_sbom}" | sort > /tmp/old_pkgs_${key}.txt

              # Names only for added/removed detection
              cut -f1 /tmp/new_pkgs_${key}.txt | sort -u > /tmp/new_names_${key}.txt
              cut -f1 /tmp/old_pkgs_${key}.txt | sort -u > /tmp/old_names_${key}.txt

              # Added / Removed sets based on names
              comm -13 /tmp/old_names_${key}.txt /tmp/new_names_${key}.txt > /tmp/added.tmp || true
              comm -23 /tmp/old_names_${key}.txt /tmp/new_names_${key}.txt > /tmp/removed.tmp || true

              # Updated: same name, different version
              updated_tmp=$(mktemp)
              awk -F'\t' 'NR==FNR{old[$1]=$2;next}{ if($1 in old && old[$1]!=$2){ print $1"\t"old[$1]" → "$2 } }' \
                /tmp/old_pkgs_${key}.txt /tmp/new_pkgs_${key}.txt > "${updated_tmp}"

              addc=$(wc -l < /tmp/added.tmp | tr -d ' ')
              updc=$(wc -l < "${updated_tmp}" | tr -d ' ')
              delc=$(wc -l < /tmp/removed.tmp | tr -d ' ')

              printed=false
              echo "**Package Changes** _(based on SBOM diff)_" >> "${out}"
              echo "" >> "${out}"

              if [ "$updc" -gt 0 ]; then
                {
                  echo "**Updated (${updc})**"
                  echo ""
                  awk -F'\t' '{printf "- %s: %s\n",$1,$2}' "${updated_tmp}"
                  echo ""
                } >> "${out}"
                printed=true
              fi

              if [ "$addc" -gt 0 ]; then
                {
                  echo "**Added (${addc})**"
                  echo ""
                  awk -v OFS='\t' 'NR==FNR{ver[$1]=$2;next}{n=$0; if(n!=""){ printf "- %s: %s\n", n, ver[n] }}' \
                    /tmp/new_pkgs_${key}.txt /tmp/added.tmp
                  echo ""
                } >> "${out}"
                printed=true
              fi

              if [ "$delc" -gt 0 ]; then
                {
                  echo "**Removed (${delc})**"
                  echo ""
                  awk '{print "- " $0}' /tmp/removed.tmp
                  echo ""
                } >> "${out}"
                printed=true
              fi

              [ "$printed" = true ] && any_section=true

              rm -f /tmp/added.tmp /tmp/removed.tmp "${updated_tmp}"
              rm -f /tmp/old_pkgs_${key}.txt /tmp/old_names_${key}.txt
            else
              echo "**Package Changes** _(based on SBOM diff)_" >> "${out}"
              echo "" >> "${out}"
              echo "_No previous version — initial publication (showing all as Added)_" >> "${out}"
              echo "" >> "${out}"
              awk -F'\t' '{printf "- %s: %s\n",$1,$2}' /tmp/new_pkgs_${key}.txt >> "${out}"
              echo "" >> "${out}"
              any_section=true
            fi

            rm -f /tmp/new_pkgs_${key}.txt /tmp/new_names_${key}.txt

            # Close the <details> section for this platform
            printf "\n</details>\n" >> "${out}"
          done

          $any_section || echo "_No package changes detected._" >> "${out}"

          # Move artifacts into a readable path
          mkdir -p rpm_diff_artifacts/${VMJ}
          mv "${out}" "rpm_diff_artifacts/${VMJ}/rpm_diff_${VMJ}_${IMT}.md"

      -
        name: Build SBOM label payload for image
        if: env.check_update != 0
        id: build-sbom-label
        env:
          PLATFORMS: ${{ env.platforms }}
          VMJ: ${{ matrix.version_major }}
          IMT: ${{ matrix.image_types }}
          PREV_TAG: ${{ env.prev_tag }}
          DTS: ${{ needs.init-data.outputs.date_time_stamp }}
          LABEL_KEY: org.almalinux.sbom
        run: |
          set -euo pipefail
          jq -n \
            --arg vmj "${VMJ}" \
            --arg imt "${IMT}" \
            --arg dts "${DTS}" \
            --arg prev "${PREV_TAG:-}" \
            '{
              version_major: $vmj,
              image_type: $imt,
              built_at: $dts,
              prev_tag: ( $prev | select(length>0) // null ),
              sbom_storage: "oci-referrer",
              platforms: {}
            }' > sbom_label_${VMJ}_${IMT}.json
          for p in ${PLATFORMS//,/ }; do
            plat=$(echo "$p" | xargs)
            key="${plat//\//_}"
            sbom_file="sbom_output/${VMJ}/${IMT}/sbom_${key}.spdx.json"
            [ -f "${sbom_file}" ] || continue
            sha=$(sha256sum "${sbom_file}" | awk '{print $1}')
            pkg_count=$(jq '[.packages[]? | select(.SPDXID != "SPDXRef-DOCUMENT")] | length' "${sbom_file}")
            # Metadata only; do not embed the full SBOM body
            tmp=$(mktemp)
            jq --arg plat "${plat}" \
               --arg sha "${sha}" \
               --argjson count "${pkg_count}" \
               '.platforms[$plat] = {
                  sbom_sha256: $sha,
                  package_count: $count
                }' \
               "sbom_label_${VMJ}_${IMT}.json" > "${tmp}"
            mv "${tmp}" "sbom_label_${VMJ}_${IMT}.json"
          done
          # Lightweight label JSON into environment variable
          SBOM_LABEL=$(jq -c . "sbom_label_${VMJ}_${IMT}.json")
          echo "SBOM_LABEL<<EOF" >> "$GITHUB_ENV"
          echo "$SBOM_LABEL" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "[Debug] SBOM label payload:"
          cat "sbom_label_${VMJ}_${IMT}.json"

      - name: Upload SBOM artifacts
        if: env.check_update != 0
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.version_major }}-${{ matrix.image_types }}
          path: sbom_output/${{ matrix.version_major }}/${{ matrix.image_types }}/

      - name: Upload RPM diff artifacts
        if: env.check_update != 0
        uses: actions/upload-artifact@v4
        with:
          name: rpm-diff-${{ matrix.version_major }}-${{ matrix.image_types }}
          path: rpm_diff_artifacts/${{ matrix.version_major }}/

      -
        name: Push images to Client Library
        if: env.check_update != 0
        id: push-images
        uses: docker/build-push-action@v7
        with:
          provenance: false
          context: "{{defaultContext}}:Containerfiles/${{ matrix.version_major }}"
          file: ./Containerfile.${{ matrix.image_types }}
          platforms: ${{ env.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.almalinux.sbom=${{ env.SBOM_LABEL }}

      -
        name: Push SBOM artifacts to registries (OCI referrers)
        if: env.check_update != 0
        id: sbom-push-oci
        env:
          PLATFORMS: ${{ env.platforms }}
          VMJ: ${{ matrix.version_major }}
          IMT: ${{ matrix.image_types }}
          IMAGE_NAMES: ${{ env.IMAGE_NAMES }}
        run: |
          set -euo pipefail

          for image_ref in ${IMAGE_NAMES//,/ }; do
            image_ref=$(echo "$image_ref" | xargs)
            tag="${VMJ}"
            full_ref="${image_ref}:${tag}"

            echo "=== Processing ${full_ref} ==="

            # Get the manifest list to find per-platform digests
            manifest_list=$(crane manifest "${full_ref}" 2>/dev/null) || {
              echo "Warning: Could not fetch manifest for ${full_ref}, skipping"
              continue
            }

            for p in ${PLATFORMS//,/ }; do
              plat=$(echo "$p" | xargs)
              key="${plat//\//_}"
              sbom_file="sbom_output/${VMJ}/${IMT}/sbom_${key}.spdx.json"

              [ -f "${sbom_file}" ] || {
                echo "No SBOM for ${plat}, skipping"
                continue
              }

              # Parse platform into os/arch/variant
              IFS='/' read -r os arch variant <<< "${plat}"

              # Extract the per-platform digest from manifest list
              if echo "${manifest_list}" | jq -e '.manifests' >/dev/null 2>&1; then
                if [ -n "${variant}" ]; then
                  plat_digest=$(echo "${manifest_list}" | jq -r \
                    --arg os "${os}" --arg arch "${arch}" --arg var "${variant}" \
                    '.manifests[] | select(.platform.os==$os and .platform.architecture==$arch and .platform.variant==$var) | .digest')
                else
                  plat_digest=$(echo "${manifest_list}" | jq -r \
                    --arg os "${os}" --arg arch "${arch}" \
                    '.manifests[] | select(.platform.os==$os and .platform.architecture==$arch and (.platform.variant==null or .platform.variant=="")) | .digest')
                fi
              else
                plat_digest=$(crane digest "${full_ref}" 2>/dev/null) || true
              fi

              if [ -z "${plat_digest}" ]; then
                echo "Warning: No digest found for ${plat} in ${full_ref}, skipping"
                continue
              fi

              echo "Pushing SBOM for ${plat} -> ${image_ref}@${plat_digest}"

              oras attach \
                --artifact-type "application/spdx+json" \
                "${image_ref}@${plat_digest}" \
                "${sbom_file}:application/spdx+json" || {
                  echo "Warning: Failed to push SBOM artifact for ${plat} to ${image_ref}, continuing"
                  continue
                }

              echo "Successfully attached SBOM for ${plat} to ${image_ref}@${plat_digest}"
            done
          done

      -
        name: Generate Docker Hub README
        if: contains(env.registries, 'docker.io') && matrix.image_types != 'default' && env.check_update != 0
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Generate Docker Hub repository README from template

          export image_type="${{ matrix.image_types }}"
          export version="${{ matrix.version_major }}"

          # Image type description
          case ${image_type} in
            base)
              export type_desc="The Base Image is designed to be a base for your containerized applications, middleware and utilities. Includes helpful OS tools like find, tar, vi, etc., and a full DNF stack." ;;
            minimal)
              export type_desc="The Minimal Image is a stripped-down image that uses microdnf as package manager. Designed for applications that come with their own dependencies bundled (e.g. GO, NodeJS, Java)." ;;
            micro)
              export type_desc="The Micro Image is distributed without any package manager. Uses the package manager on the underlying host to install packages, typically using Buildah or Multi-stage builds with Podman. The most secure and smallest image." ;;
            init)
              export type_desc="The Init Image extends the base image, designed to run an init system as PID 1 for running multi-services inside a container. Systemd is enabled as init system." ;;
            toolbox)
              export type_desc="The Toolbox Image is designed to be used with toolbox or distrobox utilities for development and debugging." ;;
            *)
              export type_desc="AlmaLinux ${version} ${image_type} container image." ;;
          esac

          # Extract Docker Hub namespace from registries (e.g. 'docker.io/almalinux' -> 'almalinux')
          export dockerhub_namespace=$(echo "${{ env.registries }}" | tr ',' '\n' | grep 'docker.io' | sed 's|.*docker.io/||;s|[[:space:]]||g')
          echo "dockerhub_namespace=${dockerhub_namespace}" >> $GITHUB_ENV

          # Extract tag names from docker.io tags, strip the repository prefix
          export supported_tags=$(echo "${TAGS}" | grep 'docker.io' | sed 's|.*/[^:]*:|- `|;s|$|`|')

          # Prepare platforms list in markdown format
          platforms="${{ env.platforms }}"
          export platforms_list="- \`${platforms//, /\`$'\n'- \`}\`"

          envsubst < .github/dockerhub-readme.md.tmpl > dockerhub-readme.md

      -
        name: Update Docker Hub repository description
        if: contains(env.registries, 'docker.io') && matrix.image_types != 'default' && env.check_update != 0
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.production == 'true' && secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME }}
          password: ${{ env.production == 'true' && secrets.DOCKERHUB_TOKEN || secrets.TEST_DOCKERHUB_TOKEN }}
          repository: ${{ env.dockerhub_namespace }}/${{ matrix.version_major }}-${{ matrix.image_types }}
          short-description: ${{ env.release_string }} ${{ matrix.image_types }} container image
          readme-filepath: ./dockerhub-readme.md

      -
        name: Prepare Mattermost message
        if: env.check_update != 0
        run: |
          # Mattermost message heading
          cat << 'EOF'> ${{ matrix.version_major }}_mattermost.md
          **AlmaLinux OS ${{ matrix.version_major }}${{ env.version_minor }}** Container Image, build `${{ needs.init-data.outputs.date_time_stamp }}`, generated by the [GitHub Action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Platforms:

          ```
          ${{ env.platforms }}
          ```

          EOF

          # Mattermost message body
          cat << 'EOF'> ${{ matrix.version_major }}_${{ matrix.image_types }}_mattermost.md

          :almalinux: **${{ matrix.image_types }}**

          ```
          ${{ steps.meta.outputs.tags }}
          ```
          EOF

      - name: Upload Mattermost message artifacts
        uses: actions/upload-artifact@v7
        if: env.check_update != 0
        with:
          name: mattermost-message-${{ matrix.version_major }}-${{ matrix.image_types }}
          path: ${{ matrix.version_major }}*_mattermost.md

      -
        name: Extract RootFS (default and minimal only)
        id: extract-rootfs
        # 'default' or 'minimal' images only go to Docker Official Library
        if: ( matrix.image_types == 'default' || matrix.image_types == 'minimal' ) && env.check_update != 0
        run: |
          # [RootFS]

          # File name for RootFS file (packed with tag + Xz)
          name=almalinux-${{ matrix.version_major }}-${{ matrix.image_types }}
          pwd=$( pwd )
          path=${pwd}/${name}
          almalinux_release='almalinux-release'
          [ "${{ matrix.version_major }}" = "10-kitten" ] && almalinux_release='almalinux-kitten-release'

          # The "tar file" for 'docker save' to write to
          tar_name=${pwd}/${name}.tar

          mkdir ${path}
          cd ${path}

          # Produce a tarred repository and save it to the "tar file".
          docker save ${{ steps.build-images.outputs.digest }} -o ${tar_name}

          # Extract the "tar file"
          tar xf ${tar_name}
          cd blobs/sha256

          # The "temporary Dockerfile" to build image based on RootFS
          cat <<EOF > Dockerfile
          FROM scratch
          ADD rootfs.tar.gz /
          CMD ["/bin/bash"]
          EOF

          # Loop blobs to find all zipped files that are RootFS for a particular architecture
          for file in `find . -type f`; do
            if file --brief ${file} | grep -i gzip >/dev/null; then
              # Make a copy of "taken RootFS"
              cp -av ${file} rootfs.tar.gz

              # Build an image from the "temporary Dockerfile"
              docker build -t rootfs .

              # Run the image and query almalinux-release package's architecture
              arch=$( docker run --rm rootfs /bin/bash -c "rpm -q --qf=%{ARCH} ${almalinux_release}" )

              # Map found architecture to the corresponding platform
              platform=
              docker rmi rootfs
              case ${arch} in
                i686)
                  platform=386;;
                x86_64)
                  platform=amd64;;
                x86_64_v2)
                  platform=amd64_v2;;
                ppc64le)
                  platform=ppc64le;;
                s390x)
                  platform=s390x;;
                aarch64)
                  platform=arm64;;
                riscv64)
                  platform=riscv64;;
                *)
                  echo "The '$arch' is incorrect or failed to determine architecture." && false;;
              esac

              # Delete copy of the "taken RootFS"
              rm -f rootfs.tar.gz

              # Copy the "taken RootFS" into corresponded .tar.xz
              cp -av ${file} ${name}-${platform}.tar.gz
              zcat ${name}-${platform}.tar.gz | xz -9 -e -T0 > ${pwd}/${{ matrix.version_major }}/${{ matrix.image_types }}/${platform}/${name}-${platform}.tar.xz

            fi
          done

          # Clean up
          rm -rf ${path}

          echo "[Debug]"
          ls -1 ${pwd}/${{ matrix.version_major }}/${{ matrix.image_types }}/*/*.tar.xz

      # Change date stamp in '${version_major}/${image_types}/${arch}/Dockerfile'
      -
        name: Change date stamp in Dockerfile (default and minimal only)
        # 'default' or 'minimal' images only go to Docker Official Library
        if: ( matrix.image_types == 'default' || matrix.image_types == 'minimal' ) && env.check_update != 0
        run: |
          # [Dockerfile]

          platforms="${{ env.platforms }}"
          for platform in ${platforms//,/ }; do
            arch=${platform#linux/}
            arch=${arch/\//_}
            dockerfile=${{ matrix.version_major }}/${{ matrix.image_types }}/${arch}/Dockerfile

            case ${{ matrix.image_types }} in
              default)
                tags="${{ matrix.version_major }}${{ env.version_minor }}, ${{ matrix.version_major }}${{ env.version_minor }}-${{ env.date_stamp }}"
                [ "${{ matrix.version_major }}" != "10-kitten" ] && tags="${{ matrix.version_major }}, ${tags}"
                [ "${{ matrix.version_major }}" = "${{ env.version_latest }}" ] && tags="latest, ${tags}" ;;
              minimal)
                tags="${{ matrix.version_major }}${{ env.version_minor }}-${{ matrix.image_types }}, ${{ matrix.version_major }}${{ env.version_minor }}-${{ matrix.image_types }}-${{ env.date_stamp }}"
                [ "${{ matrix.version_major }}" != "10-kitten" ] && tags="${{ matrix.version_major }}-${{ matrix.image_types }}, ${tags}"
                [ "${{ matrix.version_major }}" = "${{ env.version_latest }}" ] && tags="minimal, ${tags}" ;;
              *)
            esac

            # Tags: 8, 8.9, 8.9-20231124
            sed -i "/^\([[:space:]]*#[[:space:]]*Tags: \).*/s//\1${tags}/" ${dockerfile}

            echo "[Debug] ${dockerfile}"
            cat ${dockerfile}
          done

      # Commit '${version_major}/${image_types}/${arch}/*'
      -
        name: "Commit and push ${{ matrix.image_types }}/*/* Dockerfile and RootFS (branch ${{ matrix.version_major }})"
        # 'default' or 'minimal' images only and 'Push to production' is checked
        if: ( matrix.image_types == 'default' || matrix.image_types == 'minimal' ) && env.production == 'true' && env.check_update != 0
        uses: EndBug/add-and-commit@v9
        with:
          default_author: user_info
          new_branch: ${{ matrix.version_major }}
          cwd: ${{ matrix.version_major }}
          pull: '--rebase --autostash'
          message: "AlmaLinux ${{ matrix.version_major }} ${{ matrix.image_types }} - ${{ env.date_stamp }} ${{ env.time_stamp }} (generated on ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          push: true

  publish-rpm-diff:
    name: Publish RPM diff to GitHub Release
    runs-on: ubuntu-24.04
    needs: [init-data, build-test-push]
    steps:
      - name: Download all RPM diff artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-diff-*
          merge-multiple: true
          path: _rpm_diff_all
        continue-on-error: true

      - name: Download all SBOM artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true
          path: _sbom_all
        continue-on-error: true

      - name: Check artifacts existence
        id: chk
        run: |
          set -euo pipefail
          # Recursively search to find any rpm_diff_*.md anywhere
          if ! find _rpm_diff_all -type f -name 'rpm_diff_*.md' | grep -q .; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No RPM diff artifacts found. Skipping release."
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Compose release notes (group by version & type)
        if: steps.chk.outputs.found == 'true'
        id: notes
        run: |
          set -euo pipefail

          DATE_STAMP='${{ needs.init-data.outputs.date_stamp }}'
          TIME_STAMP='${{ needs.init-data.outputs.time_stamp }}'
          PROD='${{ needs.init-data.outputs.production }}'

          header="# AlmaLinux Container Images – SBOM-based RPM diffs (${DATE_STAMP} ${TIME_STAMP} UTC)\n"
          [ "${PROD}" = "true" ] && header="${header}\n_Release type: **Production**_\n" || header="${header}\n_Release type: **Testing / Pre-release**_\n"
          header="${header}\n_Changelogs generated from SPDX 2.3 SBOM comparison using [cloud-images-sbom-tools](https://github.com/AlmaLinux/cloud-images-sbom-tools)_\n"
          printf "%b\n" "${header}" > RELEASE_NOTES.md

          # Collect all md files regardless of where they were unpacked
          mapfile -t FILES < <(find _rpm_diff_all -type f -name 'rpm_diff_*.md' | sort)

          # Build a map: vmj::type -> file (robustly extracted from file name)
          declare -A MAP
          declare -A TYPES_OF
          for f in "${FILES[@]}"; do
            base=$(basename "$f")
            if [[ "$base" =~ ^rpm_diff_([0-9]+|10-kitten)_([a-z0-9_-]+)\.md$ ]]; then
              vmj="${BASH_REMATCH[1]}"
              itype="${BASH_REMATCH[2]}"
              key="${vmj}::${itype}"
              MAP["$key"]="$f"
              TYPES_OF["$vmj"]+="$itype "
            fi
          done

          # Sort versions ascending; output types in a fixed order for readability
          mapfile -t VMJS < <(printf "%s\n" "${!TYPES_OF[@]}" | sort -V)
          ORDER=(default minimal micro base init toolbox)

          for vmj in "${VMJS[@]}"; do
            echo -e "\n## AlmaLinux ${vmj}\n" >> RELEASE_NOTES.md

            read -r -a tlist <<< "${TYPES_OF[$vmj]}"

            # Output known types in preferred order
            for want in "${ORDER[@]}"; do
              for itype in "${tlist[@]}"; do
                [ "$itype" != "$want" ] && continue
                key="${vmj}::${itype}"
                f="${MAP[$key]}"
                [ -z "$f" ] && continue
                echo -e "\n### Image type: \`${itype}\`\n" >> RELEASE_NOTES.md
                # Inline the full changelog (Added/Updated/Removed) for each flavor
                cat "$f" >> RELEASE_NOTES.md
              done
            done
            # Any unknown types go last
            for itype in "${tlist[@]}"; do
              if [[ ! " ${ORDER[*]} " =~ " ${itype} " ]]; then
                key="${vmj}::${itype}"
                f="${MAP[$key]}"
                [ -z "$f" ] && continue
                echo -e "\n### Image type: \`${itype}\`\n" >> RELEASE_NOTES.md
                cat "$f" >> RELEASE_NOTES.md
              fi
            done
          done

          # Archive the original markdown files + SBOM files for attachment
          tar -czf rpm-diff-artifacts-${DATE_STAMP}.tar.gz -C _rpm_diff_all .

          # Also archive SBOM artifacts if they exist
          if [ -d _sbom_all ] && find _sbom_all -type f -name '*.spdx.json' | grep -q .; then
            tar -czf sbom-artifacts-${DATE_STAMP}.tar.gz -C _sbom_all .
          fi

          echo "tag=v${DATE_STAMP}"  >> "$GITHUB_OUTPUT"
          echo "name=AlmaLinux Container RPM diffs (${DATE_STAMP})" >> "$GITHUB_OUTPUT"

      - name: Create/Update GitHub Release
        if: steps.chk.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ needs.init-data.outputs.production != 'true' }}
          files: |
            rpm-diff-artifacts-${{ needs.init-data.outputs.date_stamp }}.tar.gz
            sbom-artifacts-${{ needs.init-data.outputs.date_stamp }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-mattermost:
    name: Mattermost notification
    runs-on: ubuntu-24.04
    needs: [init-data, build-test-push]
    if: needs.init-data.outputs.notify_mattermost == 'true'
    strategy:
      fail-fast: false
      matrix:
        version_major: ${{ fromJSON(needs.init-data.outputs.version_major_matrix) }}

    steps:
      - name: Download Mattermost message artifacts
        uses: actions/download-artifact@v8

      - name: Create Mattermost message
        run: |
          # Artifacts are downloaded into mattermost-message-${{ matrix.version_major }}-* directory
          # Find any ${{ matrix.version_major }}_mattermost.md over all image types and copy it to the current directory
          # If no such file found, set notify_mattermost to false and exit (no notification will be sent)
          # If found, set MATTERMOST_TEXT environment variable with complete message
          notify_mattermost=true
          mattermost_md=$(ls -1 mattermost-message-${{ matrix.version_major }}-*/${{ matrix.version_major }}_mattermost.md 2>/dev/null | head -1)
          if [ -f "${mattermost_md}" ]; then
            cp -av "${mattermost_md}" .
          else
            notify_mattermost=false
          fi
          echo "notify_mattermost=${notify_mattermost}" >> $GITHUB_ENV
          [ "${notify_mattermost}" = "false" ] && exit 0

          # MATTERMOST_TEXT environment variable with complete message
          {
            echo 'MATTERMOST_TEXT<<EOF'
            cat ${{ matrix.version_major }}_mattermost.md
            cat mattermost-message-${{ matrix.version_major }}-*/${{ matrix.version_major }}_*_mattermost.md
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Send notification to Mattermost
        if: env.notify_mattermost == 'true'
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          MATTERMOST_CHANNEL: ${{ vars.MATTERMOST_CHANNEL }}
          MATTERMOST_USERNAME: ${{ github.triggering_actor }}
          TEXT: ${{ env.MATTERMOST_TEXT }}

  optimize-repo-size:
    # 'default' or 'minimal' images only and 'Push to production' is checked or scheduled run
    if: ( contains(needs.init-data.outputs.image_types_matrix, 'default') || contains(needs.init-data.outputs.image_types_matrix, 'minimal') ) && needs.init-data.outputs.production == 'true'
    name: Optimize size of repository, branch '${{ matrix.version_major }}'
    runs-on: ubuntu-24.04
    needs:
      - init-data
      - build-test-push
    strategy:
      fail-fast: false
      matrix:
        version_major: ${{ fromJSON(needs.init-data.outputs.version_major_matrix) }}

    steps:

      -
        name: Checkout ${{ github.repository }}, branch '${{ matrix.version_major }}', path '${{ matrix.version_major }}'
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.version_major }}
          path: ${{ matrix.version_major }}

      -
        name: Optimize size of branch the '${{ matrix.version_major }}'
        run: |
          date_stamp=${{ needs.init-data.outputs.date_stamp }}
          cd ${{ matrix.version_major }}

          echo "Prepare new branch 'tmp' based on ${{ matrix.version_major }}"
          git checkout -b tmp

          echo "Delete local branch '${{ matrix.version_major }}'"
          git branch -D ${{ matrix.version_major }}

          echo "Preserve resent data"
          mkdir ../tmp-${date_stamp}

          mv ./default ../tmp-${date_stamp}/
          mv ./minimal ../tmp-${date_stamp}/

          echo "Crete orphan branch '${{ matrix.version_major }}'"
          git checkout --orphan ${{ matrix.version_major }}

          echo "Clean up"
          git rm --cached -r .
          rm -rf ./default
          rm -rf ./minimal

          echo "Restore resent data"
          mv ../tmp-${date_stamp}/default ./
          mv ../tmp-${date_stamp}/minimal ./

          echo "[Debug]"
          git status

      -
        name: Commit and push ${{ github.repository }}, branch '${{ matrix.version_major }}'
        uses: EndBug/add-and-commit@v9
        with:
          default_author: user_info
          message: "Update AlmaLinux ${{ matrix.version_major }} - ${{ needs.init-data.outputs.date_stamp }} ${{ needs.init-data.outputs.time_stamp }} (generated on ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          push: '--force --set-upstream origin ${{ matrix.version_major }}'
          cwd: ${{ matrix.version_major }}
